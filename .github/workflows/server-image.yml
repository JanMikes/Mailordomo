name: server-image

# The `verify` job runs the identical `npm run verify` gate in CI (secondary gate; the husky
# pre-push hook is primary). The `build-and-publish` job builds the metadata-service image and
# publishes it to GHCR on push to `main` and on tags (no deploy step).

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # The lockfile is generated by npm 11 (the dev machine runs Node 25). Node 22 ships npm 10,
      # whose `npm ci` rejects an npm-11 lock as "out of sync" (optional-dep + peer representation
      # differ between npm 10 and 11). Pin npm 11 so the install matches the lock, while still
      # validating on the Node 22 LTS runtime.
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run verify

  build-and-publish:
    needs: verify
    # Publish only on push to main + tags; never on pull_request (no GHCR push from forks).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mailordomo-metadata-service
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
